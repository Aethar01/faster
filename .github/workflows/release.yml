name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          ldflags="-s -w -X github.com/Aethar01/faster/internal/faster.version=${version}"
          mkdir -p dist

          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            name="faster_${version}_${os}_${arch}"
            binary="${name}/faster"
            if [ "${os}" = "windows" ]; then
              binary="${binary}.exe"
            fi

            mkdir -p "dist/${name}"
            GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath -ldflags "${ldflags}" -o "dist/${binary}" .
            cp README.md LICENSE "dist/${name}/"

            if [ "${os}" = "windows" ]; then
              (cd dist && zip -r "${name}.zip" "${name}")
            else
              tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            fi
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
